<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Student Information</h1>

<form action="/action_page.php">

    <fieldset>
        <legend>Student Information</legend>

        <table>
            <tr>
                <td>
                    <label for="fullname">Full Name:</label><br>
                    <input type="text" placeholder="Write your full name">
                </td>

                <td>
                    <label for="email">Email Address:</label><br>
                    <input type="email" placeholder="Enter your email">
                </td>
            </tr>
        </table>

        <br>
        <table>
            <tr>
                <td>

        <label for="password">Password:</label><br>
        <input type="password" placeholder="Enter your password">
            </td>
            <td>
             <label for="Age(Number)">Age (Number):</label><br>
             <input type="number" placeholder="Enter your age">
            

            </td>
            </tr>
        </table>

        <br><br>
        <table>
            <tr>
                <td>

        <label for="expdate">Experiment Date:</label><br>
        <input type="date" placeholder="date"
        style="width:175px;">
        </td>

        <td>
            <label for="Phone Number(Tel)">Phone Number(Tel):</label><br>
        <input type="tel" placeholder="01XXXXXXXXXXXXXX">
      

        </td>
        </tr>
        </table>

        <br><br>

       <br>

<table style="width:250px;">
    <tr>
        <td>
           
            <input type="submit" value="Submit">
        </td>

        <td>
            <input type="reset" value="Clear">
        </td>
    </tr>
</table>

    </fieldset>

</form>

</body>
</html>
