<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card card1">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQaVRj5810mVw286apZPbzxgr81EGkRTZimgTRUXkAdRjtPOTSDOpokykzq&s=10" alt="Product 1">
        <h2>Wireless Mouse</h2>
        <p>Comfortable wireless mouse with long battery life.</p>
        <h3>$25</h3>
    </div>

    <div class="card card2">
        <img src="https://www.shutterstock.com/image-vector/computer-keyboard-black-color-vector-260nw-2504979535.jpg" alt="Product 2">
        <h2>Keyboard</h2>
        <p>Mechanical keyboard with RGB lighting.</p>
        <h3>$45</h3>
    </div>

    <div class="card card3">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT3OjQ1EjvtinitwqU9bGyNWbcdCDlTDsqbZtCSZ1-uVA&s" alt="Product 3">
        <h2>Headphones</h2>
        <p>Noise-cancelling headphones for music and gaming.</p>
        <h3>$70</h3>
    </div>

    <div class="card card4">
        <img src="https://images.unsplash.com/photo-1579586337278-3befd40fd17a?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8c21hcnQlMjB3YXRjaHxlbnwwfHwwfHx8MA%3D%3D" alt="Product 4">
        <h2>Smart Watch</h2>
        <p>Track fitness, notifications, and daily activities easily.</p>
        <h3>$99</h3>
    </div>

</div>

</body>
</html>
